name: Release Installer

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Refresh packwiz index
        shell: pwsh
        run: .\packwiz.exe refresh

      - name: Ensure release assets exist
        shell: pwsh
        run: |
          if (-not (Test-Path "packwiz-installer-bootstrap.jar")) {
            throw "packwiz-installer-bootstrap.jar fehlt im Repository."
          }
          if (-not (Test-Path "launcher-commands.txt")) {
            throw "launcher-commands.txt fehlt im Repository."
          }

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Residenz-Life latest
          make_latest: true
          overwrite_files: true
          files: |
            packwiz-installer-bootstrap.jar
            launcher-commands.txt
